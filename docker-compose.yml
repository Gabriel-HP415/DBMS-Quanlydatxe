services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: busbooking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: busbooking-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_HOST: sqlserver
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      SCRIPTS_DIR: /scripts
    volumes:
      - ./database:/scripts:ro
      - ./database/docker-init.sh:/docker-init.sh:ro
    entrypoint: ["/bin/bash", "/docker-init.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busbooking-backend
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: BusBookingDB
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      CHE_DO_KHOA_MAC_DINH: BI_QUAN
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: busbooking-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  sqlserver_data: